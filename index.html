    <!-- home -->
    <section id="homePage" class="">
      <header id="header">
        <div class="navbar bg-base-100 shadow-sm gap-2">
          <img class="w-[36px]" src="./assets/github-logo.png" alt="" />
          <div class="flex-1">
            <a class="btn btn-ghost text-sm md:text-xl"
              >GitHub Issues Tracker</a
            >
          </div>
          <div class="input input-bordered w-24 md:w-auto">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search issues..." />
          </div>
          <button class="btn btn-outline bg-[#4A00FF] text-white">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </header>

      <section id="">
        <div id="btnContainer" class="flex gap-4 my-8"></div>
        <div id="countContainer">
          <div class="flex justify-between">
            <div class="flex">
              <img
                class="bg-gray-200 rounded-full p-2"
                src="./assets/Aperture.png"
                alt=""
              />
              <div class="ml-3">
                <h2><span id="count"></span> issues</h2>
                <p class="text-sm text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-4">
              <p class="text-green-600 rounded-full"></p>
              <h2 id="openText">open</h2>
              <h2 id="closedText">Close</h2>
            </div>
          </div>
        </div>
        <!--spinner -->
        <section id="spinner" class="flex justify-center hidden">
          <span class="loading loading-ring loading-xs"></span>
          <span class="loading loading-ring loading-sm"></span>
          <span class="loading loading-ring loading-md"></span>
        </section>
        <div
          id="cardContainer"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-5"
        ></div>
      </section>
    </section>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="modalDetails" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="modalContainer" class=""></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="./script/index.js"></script>
